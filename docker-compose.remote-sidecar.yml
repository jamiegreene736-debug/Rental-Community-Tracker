# Fully remote sidecar: Selenium Chrome/noVNC pool + queue workers on one VPS.
#
#   cp .env.remote-sidecar.example .env.remote-sidecar
#   ./scripts/deploy-remote-sidecar-docker.sh 8
#
# Railway web app stays on Railway; workers here poll SIDECAR_SERVER over HTTPS.

name: rct-remote-sidecar

networks:
  sidecar:
    driver: bridge

x-chrome-server-base: &chrome-server-base
  image: selenium/standalone-chrome-debug:latest
  shm_size: 2gb
  networks: [sidecar]
  environment:
    SE_NODE_MAX_SESSIONS: "1"
    SE_NODE_OVERRIDE_MAX_SESSIONS: "true"
    SE_START_XVFB: "true"
    SE_SCREEN_WIDTH: "1280"
    SE_SCREEN_HEIGHT: "900"
    SE_SCREEN_DEPTH: "24"
    SE_BROWSER_ARGS_REMOTE_DEBUGGING_ADDRESS: "--remote-debugging-address=0.0.0.0"
    SE_BROWSER_ARGS_REMOTE_DEBUGGING_PORT: "--remote-debugging-port=9222"
    SE_BROWSER_ARGS_NO_SANDBOX: "--no-sandbox"
    SE_BROWSER_ARGS_DISABLE_SETUID_SANDBOX: "--disable-setuid-sandbox"
    SE_BROWSER_ARGS_DISABLE_DEV_SHM_USAGE: "--disable-dev-shm-usage"
    SE_BROWSER_ARGS_DISABLE_GPU: "--disable-gpu"
  restart: unless-stopped

x-sidecar-worker: &sidecar-worker
  build:
    context: .
    dockerfile: daemon/vrbo-sidecar/Dockerfile
  networks: [sidecar]
  env_file: .env.remote-sidecar
  environment:
    CHROME_PRIMARY: server
    SIDECAR_BROWSER_MODE: server
    SIDECAR_WORKER_ROLE: server
    SIDECAR_DISABLE_LOCAL_CDP_FALLBACK: "1"
    SERVER_CHROME_FALLBACK_ENABLED: "1"
    SERVER_CHROME_FALLBACK_VRBO: "1"
  restart: unless-stopped

services:
  chrome-server-1:
    <<: *chrome-server-base
    container_name: rct-chrome-server-1
    ports: ["9223:9222", "4445:4444", "5901:5900", "7901:7900"]

  chrome-server-2:
    <<: *chrome-server-base
    container_name: rct-chrome-server-2
    ports: ["9224:9222", "4446:4444", "5902:5900", "7902:7900"]

  chrome-server-3:
    <<: *chrome-server-base
    container_name: rct-chrome-server-3
    ports: ["9225:9222", "4447:4444", "5903:5900", "7903:7900"]

  chrome-server-4:
    <<: *chrome-server-base
    container_name: rct-chrome-server-4
    ports: ["9226:9222", "4448:4444", "5904:5900", "7904:7900"]

  chrome-server-5:
    <<: *chrome-server-base
    container_name: rct-chrome-server-5
    ports: ["9227:9222", "4449:4444", "5905:5900", "7905:7900"]
    profiles: [scale-8]

  chrome-server-6:
    <<: *chrome-server-base
    container_name: rct-chrome-server-6
    ports: ["9228:9222", "4450:4444", "5906:5900", "7906:7900"]
    profiles: [scale-8]

  chrome-server-7:
    <<: *chrome-server-base
    container_name: rct-chrome-server-7
    ports: ["9229:9222", "4451:4444", "5907:5900", "7907:7900"]
    profiles: [scale-8]

  chrome-server-8:
    <<: *chrome-server-base
    container_name: rct-chrome-server-8
    ports: ["9230:9222", "4452:4444", "5908:5900", "7908:7900"]
    profiles: [scale-8]

  sidecar-supervisor:
    <<: *sidecar-worker
    container_name: rct-sidecar-supervisor
    environment:
      MAX_LOCAL_CHROME_INSTANCES: ${MAX_LOCAL_CHROME_INSTANCES:-8}
      SERVER_CHROME_ENDPOINTS: ${SERVER_CHROME_ENDPOINTS}
