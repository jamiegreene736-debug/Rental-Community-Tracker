[phases.setup]
nixPkgs = [
  'nodejs_22',
  'glib',
  'nss',
  'nspr',
  'dbus',
  'atk',
  'at-spi2-atk',
  'cups',
  'expat',
  'pango',
  'cairo',
  'mesa',
  'libdrm',
  'libxkbcommon',
  'alsa-lib',
  'xorg.libX11',
  'xorg.libxcb',
  'xorg.libXcomposite',
  'xorg.libXcursor',
  'xorg.libXdamage',
  'xorg.libXext',
  'xorg.libXfixes',
  'xorg.libXi',
  'xorg.libXrandr',
  'xorg.libXrender',
]

# Download Playwright's bundled Chromium during build. The system libs
# above satisfy its runtime deps; this brings in the actual binary
# Playwright expects at ~/.cache/ms-playwright/chromium-*. Without
# this step, chromium.launch() fails with "Executable doesn't exist
# at chromium_headless_shell-1208/...".
[phases.build]
cmds = [
  'npx playwright install chromium',
  'npm run build',
]
